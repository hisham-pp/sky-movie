appId: com.skymovie.desktop
productName: Sky Movie
copyright: Copyright 2026 Sky Movie
executableName: sky-movie
icon: build/favicon.png

directories:
  output: dist
  buildResources: build

files:
  - out/**
  - package.json

asar: true
asarUnpack:
  - '**/*.node'

npmRebuild: true
buildDependenciesFromSource: false

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: dir
      arch:
        - x64
        - arm64
  artifactName: 'Sky-Movie-${version}-${arch}-Setup.${ext}'
  # Code signing configuration (requires certificate)
  # Uncomment and configure when you have a code signing certificate
  # certificateFile: path/to/certificate.pfx
  # certificatePassword: ${env.WINDOWS_CERTIFICATE_PASSWORD}
  # Or use certificateSha1 for certificates in Windows certificate store
  # certificateSha1: ${env.WINDOWS_CERTIFICATE_SHA1}
  # Sign the NSIS installer and uninstaller
  # sign: path/to/signtool.exe
  # signDlls: true

mac:
  category: public.app-category.video
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: 'Sky-Movie-${version}-${arch}.${ext}'
  # Code signing for macOS (requires Apple Developer account)
  # Uncomment and configure when you have signing credentials
  # identity: "Developer ID Application: Your Name (TEAM_ID)"
  # hardenedRuntime: true
  # gatekeeperAssess: false
  # entitlements: build/entitlements.mac.plist
  # entitlementsInherit: build/entitlements.mac.plist
  # Notarization (required for macOS 10.15+)
  # notarize:
  #   teamId: ${env.APPLE_TEAM_ID}
  #   appleId: ${env.APPLE_ID}
  #   appleIdPassword: ${env.APPLE_APP_SPECIFIC_PASSWORD}

linux:
  category: AudioVideo
  maintainer: Sky Movie
  syncDesktopName: true
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: tar.gz
      arch:
        - x64
        - arm64
  artifactName: 'Sky-Movie-${version}-${arch}.${ext}'

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Sky Movie

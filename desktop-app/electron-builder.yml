appId: com.skymovie.desktop
productName: Sky Movie
copyright: Copyright 2026 Sky Movie

directories:
  output: dist
  buildResources: build

files:
  - out/**
  - package.json

asar: true
asarUnpack:
  - '**/*.node'

npmRebuild: true
buildDependenciesFromSource: false

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: dir
      arch:
        - x64
  artifactName: '${productName}-${version}-${arch}-Setup.${ext}'

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Sky Movie

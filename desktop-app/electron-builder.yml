appId: com.skymovie.desktop
productName: Sky Movie
copyright: Copyright 2026 Sky Movie
executableName: sky-movie

directories:
  output: dist
  buildResources: build

files:
  - out/**
  - package.json

asar: true
asarUnpack:
  - '**/*.node'

npmRebuild: true
buildDependenciesFromSource: false

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: dir
      arch:
        - x64
        - arm64
  artifactName: '${productName}-${version}-${arch}-Setup.${ext}'

mac:
  category: public.app-category.video
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: '${productName}-${version}-${arch}.${ext}'

linux:
  category: AudioVideo
  maintainer: Sky Movie
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: tar.gz
      arch:
        - x64
        - arm64
  artifactName: '${productName}-${version}-${arch}.${ext}'

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Sky Movie

name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:win:builder -- --x64
          - os: windows-latest
            platform: windows
            arch: arm64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:win:builder -- --arm64
          - os: macos-latest
            platform: macos
            arch: x64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:mac -- --x64
          - os: macos-latest
            platform: macos
            arch: arm64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:mac -- --arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:linux -- --x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:linux -- --arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: pnpm install

      - name: Prepare FFmpeg bundle
        run: pnpm --filter @sky-movie/desktop-app run prepare:ffmpeg

      - name: Rebuild native modules for Electron
        run: pnpm --filter @sky-movie/desktop-app run rebuild:electron

      - name: Build app bundles
        run: pnpm --filter @sky-movie/desktop-app run build

      - name: Package app
        run: ${{ matrix.packageCommand }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sky-movie-${{ matrix.os }}
          path: desktop-app/dist/**

name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:win:builder -- --x64
          - os: windows-latest
            platform: windows
            arch: arm64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:win:builder -- --arm64
          - os: macos-latest
            platform: macos
            arch: x64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:mac -- --x64
          - os: macos-latest
            platform: macos
            arch: arm64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:mac -- --arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:linux -- --x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:linux -- --arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # ── Platform deps ────────────────────────────────────────────────────────
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm libmpv-dev

      - name: Install macOS system deps
        if: runner.os == 'macOS'
        run: brew install mpv

      - name: Add VS C++ workload (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $vsWhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $installer = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe"
          $vsInstallPath = & $vsWhere -latest -property installationPath
          Start-Process $installer -ArgumentList "modify --installPath `"$vsInstallPath`" --add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --includeRecommended --quiet --norestart" -Wait
      # ────────────────────────────────────────────────────────────────────────

      - name: Install dependencies
        run: pnpm install

      - name: Prepare FFmpeg bundle
        run: pnpm --filter @sky-movie/desktop-app run prepare:ffmpeg

      - name: Prepare libmpv
        run: pnpm --filter @sky-movie/desktop-app run prepare:libmpv

      - name: Build mpv native addon
        run: pnpm --filter @sky-movie/desktop-app run build:native

      - name: Rebuild native modules for Electron
        run: pnpm --filter @sky-movie/desktop-app run rebuild:electron

      - name: Build app bundles
        run: pnpm --filter @sky-movie/desktop-app run build

      - name: Package app
        run: ${{ matrix.packageCommand }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sky-movie-${{ matrix.platform }}-${{ matrix.arch }}
          path: desktop-app/dist/**

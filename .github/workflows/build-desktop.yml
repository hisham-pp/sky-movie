name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: pnpm install

      - name: Rebuild native modules for Electron
        run: pnpm --filter @sky-movie/desktop-app run rebuild:electron

      - name: Build app bundles
        run: pnpm --filter @sky-movie/desktop-app run build

      - name: Package Windows
        if: runner.os == 'Windows'
        run: pnpm --filter @sky-movie/desktop-app run package:win

      - name: Package macOS
        if: runner.os == 'macOS'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm --filter @sky-movie/desktop-app run package:mac

      - name: Package Linux
        if: runner.os == 'Linux'
        run: pnpm --filter @sky-movie/desktop-app run package:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sky-movie-${{ matrix.os }}
          path: desktop-app/dist/**

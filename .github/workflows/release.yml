name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:win:builder:ci -- --x64
          - os: windows-latest
            platform: windows
            arch: arm64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:win:builder:ci -- --arm64
          - os: macos-latest
            platform: macos
            arch: x64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:mac:ci -- --x64
          - os: macos-latest
            platform: macos
            arch: arm64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:mac:ci -- --arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:linux:ci -- --x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            packageCommand: pnpm --filter @sky-movie/desktop-app run package:linux:ci -- --arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # ── Platform deps ────────────────────────────────────────────────────────
      - name: Cache apt packages
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.arch }}-libmpv-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: apt-${{ runner.arch }}-libmpv-

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm libmpv-dev dpkg-sig

      - name: Cache Homebrew Cellar
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/mpv
            /opt/homebrew/Cellar/ffmpeg
            /opt/homebrew/Cellar/libass
            /opt/homebrew/Cellar/libplacebo
          key: brew-mpv-${{ runner.arch }}-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: brew-mpv-${{ runner.arch }}-

      - name: Install macOS system deps
        if: runner.os == 'macOS'
        run: brew install mpv || true

      - name: Check VS C++ workload (Windows)
        if: runner.os == 'Windows'
        id: vs-check
        shell: powershell
        run: |
          $vsWhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $has = & $vsWhere -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath 2>$null
          echo "has_vc=$( if ($has) { 'true' } else { 'false' } )" >> $env:GITHUB_OUTPUT

      - name: Add VS C++ workload (Windows)
        if: runner.os == 'Windows' && steps.vs-check.outputs.has_vc == 'false'
        shell: powershell
        run: |
          $vsWhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $installer = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe"
          $vsInstallPath = & $vsWhere -latest -property installationPath
          Start-Process $installer -ArgumentList "modify --installPath `"$vsInstallPath`" --add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --includeRecommended --quiet --norestart" -Wait
      # ────────────────────────────────────────────────────────────────────────

      - name: Install dependencies
        run: pnpm install

      - name: Cache libmpv artifacts
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            desktop-app/resources/mpv
            desktop-app/native/mpv-player/lib
            desktop-app/native/mpv-player/include
          key: libmpv-${{ runner.arch }}-${{ hashFiles('scripts/download-libmpv.mjs') }}

      - name: Prepare libmpv
        run: pnpm --filter @sky-movie/desktop-app run prepare:libmpv

      - name: Build mpv native addon
        run: pnpm --filter @sky-movie/desktop-app run build:native

      - name: Build app bundles
        run: pnpm --filter @sky-movie/desktop-app run build:ci

      - name: Package app
        run: ${{ matrix.packageCommand }}

      - name: Sign DEB packages
        if: runner.os == 'Linux'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "No GPG key configured. Skipping package signing."
            exit 0
          fi

          echo "$GPG_PRIVATE_KEY" | gpg --batch --import --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE"

          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')

          for deb in desktop-app/dist/*.deb; do
            [ -f "$deb" ] || continue
            dpkg-sig -k "$KEY_ID" --sign builder "$deb"
            echo "Signed: $deb"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sky-movie-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            desktop-app/dist/*.exe
            desktop-app/dist/*.dmg
            desktop-app/dist/*.zip
            desktop-app/dist/*.AppImage
            desktop-app/dist/*.deb
            desktop-app/dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG=${GITHUB_REF#refs/tags/}
            VERSION=${TAG#v}
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "TAG=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        id: notes
        run: |
          if [ -f "CHANGELOG.md" ]; then
            NOTES=$(sed -n "/## \[${{ steps.version.outputs.VERSION }}\]/,/## \[/p" CHANGELOG.md | sed '1d;$d')
          else
            NOTES="Release ${{ steps.version.outputs.VERSION }}"
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Sky Movie ${{ steps.version.outputs.VERSION }}
          body: ${{ steps.notes.outputs.NOTES }}
          draft: false
          prerelease: false
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release artifacts
        run: |
          echo "Release artifacts:"
          ls -lh artifacts/

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update website release manifest
        run: |
          git config user.name  "Sky Movie"
          git config user.email "skymovie@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          pnpm release:github --skip-sha --no-commit
          git add website/public/releases.json
          git diff --cached --quiet || git commit -m "chore(release): publish Sky Movie ${{ steps.version.outputs.VERSION }} downloads from GitHub"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
